<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Contest Image • Rebel Ants</title>
  <link rel="stylesheet" href="/contest/contest.css">
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center;
           background:#0b0f16; color:#e8eefc; padding:20px; }
    .wrap { width:100%; max-width:820px; }
    .frame { background:#0f1420; border:1px solid rgba(255,255,255,.12);
             border-radius:14px; padding:12px; box-shadow:0 10px 40px rgba(0,0,0,.35); }
    .imgbox { width:100%; background:#0b0e12; border-radius:10px; overflow:hidden; }
    .imgbox img { display:block; width:100%; height:auto; }
    .meta { display:flex; justify-content:space-between; align-items:center;
            gap:12px; margin-top:10px; font-size:13px; opacity:.9; }
    .back { color:#9fb5ff; text-decoration:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="frame">
      <div class="imgbox">
        <img id="img" alt="Contest entry"/>
      </div>
      <div class="meta">
        <div id="name"></div>
        <a id="back" class="back" href="/contest">← Back to contest</a>
      </div>
    </div>
  </div>

  <script>
  (async function(){
    const id = new URLSearchParams(location.search).get('id') || '';
    const back = document.getElementById('back');
    back.href = '/contest#e-' + encodeURIComponent(id || '');

    if (!id) { document.getElementById('name').textContent = 'Missing id'; return; }

    try {
      const r = await fetch('/api/contest/get?id=' + encodeURIComponent(id));
      const j = await r.json();
      if (!j.ok) throw new Error(j.error || 'not found');

      const e = j.entry || {};
      document.getElementById('img').src = e.imageUrl || e.url || '';
      document.getElementById('img').alt = e.name || 'entry';
      document.getElementById('name').textContent = e.name || 'Anonymous';
    } catch (err) {
      document.querySelector('.frame').innerHTML =
        '<div style="opacity:.8;padding:20px">Entry not found.</div>';
    }
  })();
  </script>
</body>
</html>
