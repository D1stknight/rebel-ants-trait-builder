<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Contest Admin</title>
  <link rel="stylesheet" href="/contest/contest.css">
  <style>
    /* Base admin styling (kept) */
    body { max-width: 980px; margin: 24px auto; padding: 0 16px; }
    h1 { margin-bottom: 18px; }
    .panel { background:#0f131a; border:1px solid rgba(255,255,255,.12); border-radius:12px; padding:14px 16px; margin-bottom:16px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; margin:10px 0; }
    label { font-size:13px; opacity:.95; display:flex; flex-direction:column; gap:6px; min-width:220px; flex:1; }
    input, button { padding:10px 12px; border-radius:10px; border:1px solid rgba(255,255,255,.18); background:#121722; color:#e8eefc; }
    input { width:100%; }
    button { cursor:pointer; }
    button[disabled] { opacity:.6; cursor:not-allowed; }
    .warn { background:#2a0f12; border-color:#6a2a30; }
    .ok { color:#7ce38b; }
    .err{ color:#ff7b7b; }
    .muted{ opacity:.75; }
    .tight { margin-top:6px; }

    /* --- Admin entries list styles --- */
    #entriesBox { display: grid; gap: 8px; }
    .entryRow {
      display: grid; grid-template-columns: 72px 1fr auto;
      align-items: center; gap: 10px;
      background:#0f131a; border:1px solid rgba(255,255,255,.12);
      border-radius:10px; padding:8px;
    }
    .entryRow img {
      width:72px; height:72px; object-fit:cover; border-radius:8px; background:#0b0e12;
    }
    .entryRow .meta { font-size:12px; line-height:1.35; }
    .entryRow .meta .id {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      opacity:.8; margin-top:4px; cursor:pointer; user-select: all;
    }
    .entryRow .meta .score { margin-top:2px; opacity:.8; }
    .entryRow .actions button { padding:6px 10px; }
  </style>
</head>
<body class="page">
  <h1>Contest Admin</h1>

  <!-- Admin key -->
  <section class="panel">
    <h3>Admin Key</h3>
    <div class="row">
      <label>RA_ADMIN_KEY
        <input id="adminkey" type="password" placeholder="Paste your exact RA_ADMIN_KEY"/>
      </label>
    </div>
    <button id="saveKey">Save</button>
    <span id="saveKeyMsg" class="muted tight"></span>
  </section>

  <!-- Start contest -->
  <section class="panel">
    <h3>Start Contest</h3>
    <div class="row">
      <label>Name
        <input id="cName" value="Rebel Ants Weekly Contest"/>
      </label>
      <label>Prompt
        <input id="cPrompt" value="Share your best overlay combo!"/>
      </label>
      <label style="max-width:180px">Duration (days)
        <input id="cDays" type="number" value="7" min="1" max="30"/>
      </label>
    </div>
    <button id="startBtn">Start</button>
    <span id="startMsg" class="muted tight"></span>
  </section>

  <!-- Close -->
  <section class="panel">
    <h3>Close Now</h3>
    <button id="closeBtn" class="warn">Close active contest</button>
    <span id="closeMsg" class="muted tight"></span>
  </section>

  <!-- Delete one entry -->
  <section class="panel">
    <h3>Delete Entry</h3>
    <div class="row">
      <label>Entry ID
        <input id="delId" placeholder="e.g. the entry id shown in /api/contest/contest"/>
      </label>
    </div>
    <button id="delBtn" class="warn">Delete Entry</button>
    <span id="delMsg" class="muted tight"></span>
  </section>

  <!-- Entries list (IDs, thumbnails, filter, one‑click delete) -->
  <section class="panel">
    <h3>Entries <span class="muted">(click ID to copy)</span></h3>
    <div class="row" style="margin:6px 0 10px;">
      <label>Filter
        <input id="entriesFilter" placeholder="Filter by name, caption, or ID"/>
      </label>
      <button id="entriesRefresh" style="align-self:flex-end;height:38px;">Refresh</button>
    </div>
    <div id="entriesBox"></div>
  </section>

  <!-- Active contest status -->
  <section class="panel">
    <h3>Active Contest</h3>
    <div id="activeInfo" class="muted">Loading…</div>
  </section>

  <!-- Overlays Publisher -->
  <section class="panel">
    <h3>Overlays Publisher</h3>
    <div class="row">
      <label>Exported JSON file
        <input id="ovFile" type="file" accept="application/json,.json"/>
      </label>
    </div>
    <button id="ovPublish">Publish live</button>
    <span id="ovMsg" class="muted tight"></span>
    <div id="ovStatus" class="muted tight"></div>
  </section>

  <script>
  (function(){
    // ---- Helpers / wiring ----
    const KEY_STORE = 'ra:adminkey';
    const $ = s => document.querySelector(s);

    const adm       = $('#adminkey');
    const saveKeyMsg= $('#saveKeyMsg');
    const startMsg  = $('#startMsg');
    const closeMsg  = $('#closeMsg');
    const delMsg    = $('#delMsg');
    const activeInfo= $('#activeInfo');

    // load saved key (so you don't retype)
    const saved = localStorage.getItem(KEY_STORE) || '';
    if (saved) adm.value = saved;

    function show(el, text, ok) {
      el.textContent = text;
      el.className = (ok ? 'ok' : 'err') + ' tight';
    }
    function clear(el){ el.textContent=''; el.className='muted tight'; }

    // common fetch wrapper that returns {status,json,raw}
    async function j(url, opts) {
      const r = await fetch(url, opts || {});
      const text = await r.text();
      try { return { status:r.status, json: JSON.parse(text), raw:text }; }
      catch { return { status:r.status, json: null, raw:text }; }
    }
    function getKey(){
      const k = (adm.value || '').trim();
      if (!k) throw new Error('Admin key is empty');
      return k;
    }

    // ---- Actions ----

    // Save key
    $('#saveKey').onclick = () => {
      try {
        const k = getKey();
        localStorage.setItem(KEY_STORE, k);
        show(saveKeyMsg, 'Saved ✓', true);
        setTimeout(() => clear(saveKeyMsg), 1500);
      } catch(e){
        show(saveKeyMsg, e.message, false);
      }
    };

    // Start contest
    $('#startBtn').onclick = async () => {
      clear(startMsg);
      let key; try { key = getKey(); } catch(e){ return show(startMsg, e.message, false); }
      $('#startBtn').disabled = true;

      const name = ($('#cName').value || 'Rebel Ants Weekly Contest').trim();
      const body = JSON.stringify({
        // send both so API that expects either "name" or older "frame" works
        name,
        frame: name,
        prompt: ($('#cPrompt').value || '').trim(),
        durationDays: Math.max(1, +$('#cDays').value || 7)
      });

      const r = await j('/api/contest/start?admin=' + encodeURIComponent(key), {
        method:'POST', headers:{'content-type':'application/json'}, body
      });
      $('#startBtn').disabled = false;

      if (r.status === 200 && r.json && r.json.ok) {
        const startedId = r.json.id || r.json?.active?.id || r.json?.contestId || '(unknown)';
        show(startMsg, 'Started ✓  id=' + startedId, true);
        await refresh();
        await refreshEntries();          // keep list in sync
      } else {
        show(startMsg, 'Start failed: ' + (r?.json?.error || r.raw), false);
      }
    };

    // Close active contest
    $('#closeBtn').onclick = async () => {
      clear(closeMsg);
      let key; try { key = getKey(); } catch(e){ return show(closeMsg, e.message, false); }
      $('#closeBtn').disabled = true;

      const r = await j('/api/contest/close?admin=' + encodeURIComponent(key), { method:'POST' });
      $('#closeBtn').disabled = false;

      if (r.status === 200 && r.json && r.json.ok) {
        show(closeMsg, 'Closed ✓', true);
        await refresh();
        await refreshEntries();          // keep list in sync
      } else {
        show(closeMsg, 'Close failed: ' + (r?.json?.error || r.raw), false);
      }
    };

    // Delete a single entry (paste entry id)
    $('#delBtn').onclick = async () => {
      clear(delMsg);
      let key; try { key = getKey(); } catch(e){ return show(delMsg, e.message, false); }
      const eid = ($('#delId').value || '').trim();
      if (!eid) return show(delMsg, 'Enter an entry id', false);

      $('#delBtn').disabled = true;
      const r = await j('/api/contest/delete?admin=' + encodeURIComponent(key), {
        method:'POST', headers:{'content-type':'application/json'},
        body: JSON.stringify({ entryId: eid })
      });
      $('#delBtn').disabled = false;

      if (r.status === 200 && r.json && r.json.ok) {
        show(delMsg, 'Deleted ✓', true);
        await refresh();
        await refreshEntries();          // keep list in sync
      } else {
        show(delMsg, 'Delete failed: ' + (r?.json?.error || r.raw), false);
      }
    };

   /* === INSERTED HERE: Overlays Publisher handler === */
const ovFile   = document.getElementById('ovFile');
const ovBtn    = document.getElementById('ovPublish');
const ovMsg    = document.getElementById('ovMsg');
const ovStatus = document.getElementById('ovStatus');

/* Robust JSON reader:
   - Accepts: [ ... ]  OR  { overlays:[ ... ] }  OR  { items:[ ... ] } (builder export)
   - Each item may have .url OR .dataURL (we prefer .url when present)
*/
async function readSelectedJSON(fileInput){
  if (!fileInput || !fileInput.files || !fileInput.files[0]) {
    throw new Error('Choose a JSON file first.');
  }
  const text = await fileInput.files[0].text();

  // helpers
  const S = v => (v == null ? '' : String(v)).trim();
  const normalize = (x) => {
    const name = S(x?.name || 'overlay');
    const url  = S(x?.url || x?.href || x?.src);
    const data = S(x?.dataURL || x?.dataUrl);
    if (!url && !data) return null;     // ignore empty items
    const out = { name };
    if (url)  out.url = url;            // prefer real URL if provided
    else out.dataURL = data;            // otherwise keep dataURL
    return out;
  };

  let parsed;
  try { parsed = JSON.parse(text); } catch {
    throw new Error('Invalid JSON file.');
  }

  let overlays;
  if (Array.isArray(parsed)) {
    overlays = parsed.map(normalize).filter(Boolean);
  } else if (Array.isArray(parsed.overlays)) {
    overlays = parsed.overlays.map(normalize).filter(Boolean);
  } else if (Array.isArray(parsed.items)) {
    overlays = parsed.items.map(normalize).filter(Boolean);
  } else {
    throw new Error('JSON must be an array or { "overlays": [...] } or { "items": [...] }.');
  }

  if (!overlays.length) throw new Error('No overlays found in file.');
  return overlays;
}

if (ovBtn){
  ovBtn.addEventListener('click', async () => {
    // clear any previous message (relies on your existing clear/show helpers)
    clear(ovMsg);
    try {
      const key = (document.getElementById('adminkey')?.value || '').trim();
      if (!key) throw new Error('Admin key is empty.');

      const overlays = await readSelectedJSON(ovFile);
      if (!overlays.length) throw new Error('No overlays in the file.');

      // 1) Clear existing published list first
      {
        const r = await j('/api/overlays?admin=' + encodeURIComponent(key), {
          method:'PUT',
          headers:{'content-type':'application/json'},
          body: JSON.stringify({ overlays: [] })   // replace with empty
        });
        if (r.status !== 200 || !r.json?.ok) {
          throw new Error('Failed to start publish: ' + (r?.json?.error || r.raw || r.status));
        }
      }

      // 2) Append in small chunks to avoid payload-too-large errors
      const BATCH_SIZE = 1; // keep 1 for safety; raise to 2–3 if your images are small
      let sent = 0;

      for (let i = 0; i < overlays.length; i += BATCH_SIZE) {
        const batch = overlays.slice(i, i + BATCH_SIZE);

        const r = await j('/api/overlays?admin=' + encodeURIComponent(key) + '&mode=append', {
          method:'POST',
          headers:{'content-type':'application/json'},
          body: JSON.stringify({ overlays: batch })
        });

        if (r.status !== 200 || !r.json?.ok) {
          throw new Error('Append failed near item ' + (i+1) + ': ' + (r?.json?.error || r.raw || r.status));
        }

        sent += (r.json.count || batch.length);
        show(ovMsg, `Publishing… ${sent}/${overlays.length}`, true);
      }

      show(ovMsg, `Published ✓ ${sent} overlays`, true);
      if (ovStatus) ovStatus.textContent = 'Updated at ' + new Date().toLocaleString();
    } catch(e){
      ovBtn.disabled = false;
      show(ovMsg, e.message || String(e), false);
    }
  });
}
/* === END Overlays Publisher handler === */
    
    // Show current active contest
    async function refresh(){
      activeInfo.textContent = 'Loading…';
      const r = await j('/api/contest/contest');   // no admin needed
      if (r.status === 200 && r.json && r.json.active) {
        const meta = r.json.meta || {};
        const end = meta.endTs ? new Date(meta.endTs).toLocaleString() : '(unknown end)';
        activeInfo.textContent = `Active ✓  id=${r.json.id} • “${meta.name||''}” • ends ${end}`;
      } else if (r.status === 200 && r.json && !r.json.active) {
        activeInfo.textContent = 'No active contest';
      } else {
        activeInfo.textContent = 'Failed to read status: ' + (r.raw || r.status);
      }
    }

    /* ===== Entries panel logic ===== */
    const entriesBox     = document.getElementById('entriesBox');
    const entriesFilter  = document.getElementById('entriesFilter');
    const entriesRefresh = document.getElementById('entriesRefresh');

    if (entriesBox && entriesRefresh && entriesFilter) {
      entriesRefresh.addEventListener('click', refreshEntries);
      entriesFilter.addEventListener('input', refreshEntries);
      // initial load
      refreshEntries();
    }

    function esc(s){ return String(s||'').replace(/[&<>"']/g,c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])); }

    async function refreshEntries(){
      if (!entriesBox) return;
      entriesBox.textContent = 'Loading…';
      const r = await j('/api/contest/contest');
      if (r.status !== 200 || !r.json) { entriesBox.textContent = 'Failed to load.'; return; }
      if (!r.json.active) { entriesBox.textContent = 'No active contest.'; return; }

      let items = Array.isArray(r.json.entries) ? r.json.entries : [];
      const q = (entriesFilter.value || '').toLowerCase().trim();
      if (q) {
        items = items.filter(e =>
          (e.name||'').toLowerCase().includes(q) ||
          (e.caption||'').toLowerCase().includes(q) ||
          String(e.id||'').toLowerCase().includes(q)
        );
      }
      if (!items.length) { entriesBox.textContent = 'No entries.'; return; }

      // newest first, then by score desc
      items.sort((a,b)=> (b.ts|0) - (a.ts|0) || (b.score|0) - (a.score|0));

      entriesBox.innerHTML = items.map(rowHTML).join('');

      // wire delete and copy
      entriesBox.querySelectorAll('[data-del]').forEach(btn=>{
        btn.addEventListener('click', async () => {
          let key; try { key = getKey(); } catch (e) { alert(e.message); return; }
          const eid = btn.getAttribute('data-del');
          const resp = await j('/api/contest/delete?admin='+encodeURIComponent(key), {
            method:'POST',
            headers:{'content-type':'application/json'},
            body: JSON.stringify({ entryId: eid })
          });
          if (resp.status === 200 && resp.json && resp.json.ok) {
            await refreshEntries();
            await refresh(); // update status box
          } else {
            alert('Delete failed: ' + (resp?.json?.error || resp.raw || resp.status));
          }
        });
      });

      entriesBox.querySelectorAll('[data-copy]').forEach(el=>{
        el.addEventListener('click', async () => {
          try {
            const val = el.getAttribute('data-copy');
            await navigator.clipboard.writeText(val);
            el.textContent = 'Copied ✓';
            setTimeout(()=>{ el.textContent = val; }, 900);
          } catch {}
        });
      });
    }

    function rowHTML(e){
      const id   = esc(e.id);
      const url  = esc(e.imageUrl || e.url || '');
      const name = esc(e.name || 'Anonymous');
      const cap  = esc(e.caption || '');
      const sc   = e.score|0;
      return `
        <div class="entryRow">
          <img src="${url}" alt="">
          <div class="meta">
            <div><b>${name}</b>${cap ? ' • ' + cap : ''}</div>
            <div class="score">Score: ${sc}</div>
            <div class="id" title="Click to copy" data-copy="${id}">${id}</div>
          </div>
          <div class="actions">
            <button class="warn" data-del="${id}">Delete</button>
          </div>
        </div>`;
    }

    // Initial admin status
    refresh();
  })();
  </script>
</body>
</html>
