<!doctype html>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Contest Admin</title>
<link rel="stylesheet" href="/contest/admin.css">
<section class="wrap">
  <h1>Contest Admin</h1>

  <div class="card">
    <label>Admin Key
      <input id="admKey" placeholder="Paste RA_ADMIN_KEY"/>
    </label>
    <button id="saveKey">Save</button>
    <span id="keyMsg" class="muted"></span>
  </div>

  <div class="card">
    <h2>Start Contest</h2>
    <label>Name <input id="cName" value="Rebel Ants Weekly Contest"></label>
    <label>Prompt <input id="cPrompt" value="Share your best overlay combo!"></label>
    <label>Duration (days) <input id="cDays" type="number" min="1" max="30" value="7"></label>
    <button id="btnStart">Start</button>
    <span id="startMsg" class="muted"></span>
  </div>

  <div class="card">
    <h2>Close Now</h2>
    <button id="btnClose">Close active contest</button>
    <span id="closeMsg" class="muted"></span>
  </div>

  <div class="card">
    <h2>Delete Entry</h2>
    <label>Entry ID <input id="delId" placeholder="paste an entry id"></label>
    <button id="btnDelete">Delete Entry</button>
    <span id="delMsg" class="muted"></span>
  </div>

  <div class="card">
    <h2>Active Contest</h2>
    <pre id="status" class="pre"></pre>
  </div>
</section>
<script src="/contest/admin.js"></script>
