<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Contest Admin</title>
  <link rel="stylesheet" href="/contest/contest.css">
  <style>
    .panel { background:#0f131a; border:1px solid rgba(255,255,255,.1); border-radius:12px; padding:14px; max-width:680px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; margin:8px 0; }
    input, button { padding:8px 10px; border-radius:10px; border:1px solid rgba(255,255,255,.15); background:#121722; color:#e8eefc; }
    button { cursor:pointer; }
    .warn { background:#2a0f12; border-color:#702b33; }
    label { font-size:13px; opacity:.9; }
    pre { padding:10px; background:#0b0e12; border:1px solid rgba(255,255,255,.08); border-radius:10px; overflow:auto; }
  </style>
</head>
<body class="page">
  <h1>Contest Admin</h1>
  <div class="panel">
    <div class="row">
      <label>Admin key <input id="adminkey" type="password" placeholder="RA_ADMIN_KEY"></label>
    </div>
    <div class="row">
      <label>Frame <input id="frame" value="Rebel Ants Weekly Contest"></label>
      <label>Prompt <input id="prompt" value="Share your best overlay combo!"></label>
      <label>Days <input id="days" type="number" value="7" min="1" max="30" style="width:80px"></label>
    </div>
    <div class="row">
      <button id="start">Start Contest</button>
      <button id="close" class="warn">Close Contest</button>
    </div>
    <pre id="log"></pre>
  </div>

  <script>
    const $ = s => document.querySelector(s);
    $('#start').onclick = async () => {
      const url  = '/api/contest/start?admin=' + encodeURIComponent($('#adminkey').value);
      const body = JSON.stringify({ frame: $('#frame').value, prompt: $('#prompt').value, durationDays: +$('#days').value || 7 });
      const r    = await fetch(url, { method: 'POST', headers: {'content-type':'application/json'}, body });
      $('#log').textContent = await r.text();
    };
    $('#close').onclick = async () => {
      const url = '/api/contest/close?admin=' + encodeURIComponent($('#adminkey').value);
      const r   = await fetch(url, { method: 'POST' });
      $('#log').textContent = await r.text();
    };
  </script>
</body>
</html>
