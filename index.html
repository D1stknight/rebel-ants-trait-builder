<body>
<div class="app">
  <aside class="panel left">
    <div class="brand">
      <div class="logo">🐜</div>
      <div class="title">Rebel Ants Builder</div>
    </div>

    <section class="card">
      <h3>Rebel Ant</h3>
      <div class="field">
        <label>Upload image</label>
        <div class="row tight">
          <input type="file" id="baseUpload" accept="image/*"/>
          <button id="clearUpload" class="btn ghost">Clear Upload</button>
        </div>
      </div>
      <div class="divider">or</div>
      <div class="field">
        <label>Paste image URL</label>
        <input type="url" id="baseUrl" placeholder="https://.../image.png"/>
        <button id="loadUrl" class="btn">Load</button>
      </div>
      <div class="field two">
        <input type="text" id="tokenIdInput" placeholder="Token ID e.g. 1137"/>
        <button id="loadToken" class="btn">Load by Token</button>
      </div>
      <p id="tokenStatus" class="muted"></p>
    </section>

    <section class="card">
      <h3>Canvas</h3>
      <div class="field two">
        <div>
          <label>Size (px)</label>
          <select id="canvasSize">
            <option value="700" selected>700</option>
            <option value="900">900</option>
            <option value="1024">1024</option>
            <option value="1200">1200</option>
          </select>
        </div>
        <div class="row tight">
          <button id="zoomOut" class="btn ghost">-</button>
          <span id="zoomVal" class="pill">100%</span>
          <button id="zoomIn" class="btn ghost">+</button>
          <button id="zoomReset" class="btn ghost">Reset</button>
        </div>
      </div>
      <div class="row tight">
        <button id="clearBase" class="btn ghost">Clear Base</button>
        <button id="clearCanvas" class="btn danger">Clear All</button>
      </div>
    </section>

    <section class="card">
      <h3>Token ID Styles</h3>
      <div class="field two">
        <input type="text" id="tokenIdDisplay" readonly value="#—"/>
        <button id="deleteTokenId" class="btn danger">Delete Token ID</button>
      </div>
      <div class="field two">
        <div>
          <label>Format</label>
          <select id="idFormat">
            <option value="standard" selected>Standard</option>
            <option value="roman">Roman Numerals</option>
            <option value="hex">Hex (0x…)</option>
            <option value="binary">Binary</option>
            <option value="leading">Leading Zeros (4)</option>
          </select>
        </div>
        <div>
          <label>Size</label>
          <input type="number" id="idSize" min="16" max="160" step="2" value="52"/>
        </div>
      </div>
      <div class="field two">
        <div>
          <label>Color</label>
          <input type="color" id="idColor" value="#ffffff"/>
        </div>
        <div>
          <label>Outline</label>
          <input type="color" id="idStrokeColor" value="#000000"/>
        </div>
      </div>
      <div class="field">
        <label>Outline width</label>
        <input type="range" id="idStrokeWidth" min="0" max="8" step="1" value="2"/>
      </div>
    </section>

    <section class="card">
      <h3>Custom Text</h3>
      <div class="field">
        <label>Type your message</label>
        <textarea id="customText" rows="3" placeholder="Enter text (日本語 OK if font supports)"></textarea>
      </div>
      <div class="field two">
        <div>
          <label>Font</label>
          <select id="fontFamily">
            <option>Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif</option>
            <option>'Arial Black', Gadget, sans-serif</option>
            <option>Arial, Helvetica, sans-serif</option>
            <option>Helvetica Neue, Helvetica, Arial, sans-serif</option>
            <option>Verdana, Geneva, sans-serif</option>
            <option>Tahoma, Geneva, sans-serif</option>
            <option>'Trebuchet MS', Helvetica, sans-serif</option>
            <option>Georgia, 'Times New Roman', serif</option>
            <option>'Times New Roman', Times, serif</option>
            <option>Palatino, 'Palatino Linotype', serif</option>
            <option>Garamond, Baskerville, 'Baskerville Old Face', 'Times New Roman', serif</option>
            <option>Baskerville, 'Times New Roman', serif</option>
            <option>Optima, Segoe, 'Segoe UI', Candara, Calibri, Arial, sans-serif</option>
            <option>Futura, 'Century Gothic', AppleGothic, sans-serif</option>
            <option>'Gill Sans', 'Gill Sans MT', Calibri, sans-serif</option>
            <option>Avenir, 'Avenir Next', 'Segoe UI', sans-serif</option>
            <option>Copperplate, 'Copperplate Gothic Light', fantasy</option>
            <option>Papyrus, fantasy</option>
            <option>'Brush Script MT', cursive</option>
            <option>'Lucida Sans Unicode', 'Lucida Grande', sans-serif</option>
            <option>'Lucida Console', Monaco, monospace</option>
            <option>Consolas, 'Lucida Console', Monaco, monospace</option>
            <option>Courier, 'Courier New', monospace</option>
            <option>Menlo, Monaco, Consolas, 'Courier New', monospace</option>
            <option>System UI, -apple-system, Segoe UI, Roboto, Arial</option>
            <option>'Noto Sans JP', System UI, -apple-system, Segoe UI, Roboto, Arial</option>
          </select>
        </div>
        <div>
          <label>Size</label>
          <input type="number" id="fontSize" min="10" max="220" step="2" value="48"/>
        </div>
      </div>
      <div class="field two">
        <div>
          <label>Fill</label>
          <input type="color" id="fontColor" value="#ffffff"/>
        </div>
        <div>
          <label>Outline</label>
          <input type="color" id="strokeColor" value="#000000"/>
        </div>
      </div>
      <div class="field">
        <label>Outline width</label>
        <input type="range" id="strokeWidth" min="0" max="8" step="1" value="2"/>
      </div>
      <div class="row tight">
        <button id="addCustomText" class="btn primary">Add Text</button>
        <button id="delSelectedText" class="btn danger">Delete Selected</button>
        <button id="delAllText" class="btn danger">Delete All</button>
      </div>
    </section>
  </aside>

  <main class="stage">
    <div class="canvas-wrap">
      <canvas id="c" width="700" height="700"></canvas>
    </div>
  </main>

  <aside class="panel right">
    <section class="card">
      <h3>Overlays</h3>
      <p class="muted" id="overlaySource">Embedded permanents: 38 items</p>
      <div class="row tight">
        <input type="file" id="overlayUpload" accept="image/*" multiple/>
        <button id="clearOverlayGrid" class="btn ghost">Clear (non-perms)</button>
      </div>
      <div id="overlayGrid" class="grid compact scroll"></div>
    </section>

    <section class="card">
      <h3>Selection</h3>
      <div class="row wrap tight">
        <button id="duplicate" class="btn ghost">Duplicate</button>
        <button id="delete" class="btn danger">Delete</button>
        <button id="bringFront" class="btn ghost">Bring to Front</button>
        <button id="sendBack" class="btn ghost">Send to Back</button>
        <button id="flipX" class="btn ghost">Flip X</button>
        <button id="flipY" class="btn ghost">Flip Y</button>
        <button id="lock" class="btn ghost">Lock</button>
        <button id="unlockAll" class="btn ghost">Unlock All</button>
        <button id="clearAllOverlays" class="btn danger">Clear All Overlays</button>
      </div>
      <div class="field">
        <label>Opacity</label>
        <input type="range" id="opacity" min="0" max="1" step="0.01" value="1"/>
      </div>
      <div class="field">
        <label>Blend mode</label>
        <select id="blendMode">
          <option value="normal">normal</option>
          <option value="multiply">multiply</option>
          <option value="screen">screen</option>
          <option value="overlay">overlay</option>
          <option value="lighten">lighten</option>
          <option value="darken">darken</option>
          <option value="difference">difference</option>
        </select>
      </div>
    </section>

    <section class="card">
      <h3>Export</h3>
      <div class="field two">
        <div>
          <label>Export quality</label>
          <select id="exportMultiplier">
            <option value="1">Standard</option>
            <option value="2" selected>HQ ×2</option>
            <option value="4">Ultra ×4</option>
          </select>
        </div>
      </div>
      <div class="row tight wrap">
        <button id="exportPng" class="btn primary">Download PNG</button>
        <button id="openNewTab" class="btn ghost">Open in New Tab</button>
      </div>
      <div class="field">
        <label>Manual link (appears after export)</label>
        <a id="manualLink" href="#" target="_blank">No export yet</a>
      </div>
      <div class="field">
        <label>Preview below</label>
        <img id="exportPreview" alt="Export preview" style="max-width:100%; border:1px solid rgba(255,255,255,.1); border-radius:10px;"/>
      </div>
    </section>
  </aside>
</div>
</body>
